              intro: "A trace-first agent system for natural gas pipeline operations, built around the principle of compute first and explain after.",
              points: [

                { title: "Outcome", body: "The paper reports gains of 2.24x over the best baseline and 2.56x over GPT-5.2." }
              ],
              tags: ["FastAPI", "Agent Runtime", "Sandbox Execution", "Benchmark Design", "PDF Reports"],
              links: [
                { label: "GitHub", href: "https://github.com/zly7/pipeclaw" },
                { label: "Paper", href: "https://www.sciencedirect.com/science/article/pii/S2667143326000429" }
              ]
            },
            {
              meta: "Smart Eldercare / Product Prototype",
              title: "Lingxi Smart Eldercare",
              image: "./public/assets/projects/lingxi-dashboard.png",
              alt: "Lingxi eldercare dashboard",
              intro: "A smart eldercare prototype grounded in real nursing-home scenarios, connecting gaze signals, scene understanding, intent recommendation, backend sync, and frontend presentation.",
              points: [
                { title: "Problem", body: "Where an elderly user looks is not the same as what they need. Care demand must be inferred together with space, time, workflow, and scene context." },
                { title: "Solution", body: "Connected Pupil / VR capture, VLM scene description, LLM reasoning, FastAPI, a React dashboard, and voice broadcast, constrained by field research." },
                { title: "Implementation", body: "The project combines field research, questionnaires, and joint debugging records into a complete prototype loop from capture to presentation." }
              ],
              tags: ["OpenAI SDK", "Google GenAI", "FastAPI", "React", "VR / Pupil"],
              links: [
                { label: "GitHub", href: "https://github.com/zly7/lingxi-eldercare" }
              ]
            },
            {
              meta: "Model Architecture / Forecasting",
              title: "PipeFormer",
              image: "./public/assets/projects/pipeformer-attention.png",
              alt: "PipeFormer sparse attention visualization",
              intro: "A physics-informed tokenized sparse Transformer for transient forecasting on large natural gas pipeline networks, where structure and efficiency both matter.",
              points: [
                { title: "Problem", body: "Full attention is too expensive on large topology graphs, while black-box forecasting alone does not naturally express physical constraints." },
                { title: "Solution", body: "Used topology-aware sparse attention, discrete tokenization, graph construction, and a physics-informed objective to balance accuracy and speed." },
                { title: "Outcome", body: "Under the paper setup, forward latency is reduced from 200ms to 14.8ms." }
              ],
              tags: ["PyTorch", "Sparse Attention", "Tokenization", "Topology Graph", "Physics Loss"],
              links: [
                { label: "GitHub", href: "https://github.com/zly7/pipeFormer" },
                { label: "Paper", href: "https://doi.org/10.1016/j.jpse.2026.100472" }
              ]
            }
          ]
        },
        skills: {
          kicker: "Skills",
          title: "Skill Matrix",
          desc: "This section stays close to what repeatedly appears in the resume instead of inflating keyword density.",
          items: [
            { title: "AI / LLM", level: "Advanced", width: "94%", tags: ["PyTorch", "GPT-2 Pretraining", "Transformer Internals", "Qwen SFT", "verl GRPO / DPO", "Parallel Rollout Reward", "vLLM / SGLang", "mmBERT Cascade", "LangChain / LangGraph"] },
            { title: "Backend / Data", level: "Advanced", width: "88%", tags: ["Python", "FastAPI", "Pydantic", "SQL", "Data Cleaning", "Evaluation Pipelines", "Benchmark Automation"] },
            { title: "Frontend / Product", level: "Strong Working", width: "76%", tags: ["React", "Dashboard UX", "Figma", "Axure", "Evaluation Reports", "Voice Flow"] },
            { title: "Workflow / Tooling", level: "Systems-Oriented", width: "80%", tags: ["Sandbox Execution", "GitHub Pages", "HF Dataset Packaging", "PDF Report Generation", "Claude Code", "Codex", "Google AI Studio"] }
          ]
        },
        metrics: {
          kicker: "Metrics",
          title: "Selected Metrics and GitHub Display Slots",
          desc: "Representative numbers from industry and research work.",
          cards: [
            { label: "RL", value: "50%", body: "ByteDance finance agent: qwen3.5-4b pass@1 on simple docx / sheet tasks rose from 42% to 50% after GRPO." },
            { label: "Privacy", value: "78%", body: "mmBERT→qwen3.5-4b cascade raised technical-spec label precision from 70% to 78% at fixed 90% recall." },
            { label: "Research", value: "2", body: "Two first-author SCI Q1 papers tied to public engineering repositories." },
            { label: "Inference", value: "14.8ms", body: "PipeFormer sparse-attention latency from the paper-reported setup." }
          ],
          heatmapTitle: "GitHub Contribution Heatmap",
          heatmapDesc: "Lightweight external embed for the live public page.",
          placeholderTitle: "Public Profile Placeholder Stack",
          placeholderDesc: "Reserved slots for GitHub activity, badges, and highlight modules.",
          placeholders: [
            { title: "GitHub Stats Card", body: "Can later be replaced with a cached image to keep the visual language fully consistent." },
            { title: "Contribution Streak / Activity Graph", body: "Useful as an additional module for showing GitHub activity over time." },
            { title: "Repo Badge Area", body: "A good slot for stars, paper links, dataset links, or highlight badges from the three flagship repos." }
          ]
        },
        contact: {
          kicker: "Contact",
          title: "Contact and Links",
          desc: "This section collects contact details, the resume PDF, and project links.",
          cards: [
            { title: "Email", body: "For collaboration, project walkthroughs, or direct communication.", linkLabel: "2674793917@qq.com", href: "mailto:2674793917@qq.com" },
            { title: "GitHub", body: "Source code, paper companion repos, and public engineering artifacts all live here.", linkLabel: "github.com/zly7", href: "https://github.com/zly7" },
            { title: "Resume PDF", body: "Full Chinese resume, linked directly for external sharing.", linkLabel: "Open Resume PDF", href: "./public/resume/zly7-resume.pdf" }
          ]
        },
        footer: { left: "zly7 / Zhang Liyu", right: "AI Systems Engineer · LLM Engineering · Pipeline Intelligence" }
      }
    };

    const ids = (name) => document.getElementById(name);
    const titleMeta = document.querySelector("title");
    const descMeta = document.querySelector('meta[name="description"]');
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const ogDesc = document.querySelector('meta[property="og:description"]');
    let currentLang = "zh";
    let subtitleIndex = 0;

    function renderStats(items, cls) {
      return items.map((item) => `<div class="card ${cls}"><strong>${item.value}</strong><span>${item.label}</span></div>`).join("");
    }
    function renderTimeline(items) {
      return items.map((item) => `<article><time>${item.time}</time><h3>${item.title}</h3><p>${item.body}</p></article>`).join("");
    }
    function renderProjects(items) {
      return items.map((item) => `
        <article class="card project">
          <div class="visual"><img src="${item.image}" alt="${item.alt}" loading="lazy" /></div>
          <div class="project-meta">${item.meta}</div>
          <h3>${item.title}</h3>
          <p>${item.intro}</p>
          <div class="points">${item.points.map((point) => `<div class="point"><strong>${point.title}</strong>${point.body}</div>`).join("")}</div>
          <div class="tags">${item.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
          <div class="links">${item.links.map((link) => `<a class="pill" href="${link.href}" target="_blank" rel="noreferrer">${link.label}</a>`).join("")}</div>
        </article>
      `).join("");
    }
    function renderExperience(items, sep) {
      return items.map((item) => `
        <article class="exp-card${item.current ? " current" : ""}">
          <div class="exp-top">
            <div class="exp-co"><span class="exp-logo">${item.logo}</span>${item.company}</div>
            <span class="exp-role">${item.role}</span>
            <span class="exp-period">${item.current ? '<span class="exp-live" aria-hidden="true"></span>' : ""}${item.period}</span>
          </div>
          <p class="exp-summary">${item.summary}</p>
          <div class="exp-projects">
            ${item.projects.map((p) => `
              <div class="exp-project">
                <h4>${p.name}</h4>
                <p>${p.intro}</p>
                <div class="exp-metrics">${p.metrics.map((m) => `<div class="exp-metric"><b>${m.value}</b><span>${m.label}</span></div>`).join("")}</div>
                <div class="exp-points">${p.points.map((pt) => `<div><strong>${pt.title}${sep}</strong>${pt.body}</div>`).join("")}</div>
                <div class="tags">${p.tags.map((t) => `<span class="tag">${t}</span>`).join("")}</div>
              </div>
            `).join("")}
          </div>
        </article>
      `).join("");
    }
    function renderSkills(items) {
      return items.map((item) => `
        <article class="card">
          <div class="skill-head"><h3>${item.title}</h3><span class="skill-meta">${item.level}</span></div>
          <div class="bar"><span data-width="${item.width}" style="width:0"></span></div>
          <div class="tags">${item.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
        </article>
      `).join("");
    }
    function animateBars() {
      const bars = document.querySelectorAll(".bar span");
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        bars.forEach((s) => { s.style.width = s.dataset.width; });
        return;
      }
      bars.forEach((s) => { s.style.width = "0"; });
      const obs = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) { e.target.style.width = e.target.dataset.width; obs.unobserve(e.target); }
        });
      }, { threshold: 0.35 });
      requestAnimationFrame(() => bars.forEach((s) => obs.observe(s)));
    }
    function renderMetrics(items) {
      return items.map((item) => `<article class="metric-box"><span class="metric-label">${item.label}</span><span class="metric-number">${item.value}</span><p>${item.body}</p></article>`).join("");
    }
    function renderPlaceholders(items) {
      return items.map((item) => `<div class="placeholder"><strong>${item.title}</strong><p>${item.body}</p></div>`).join("");
    }
    function renderContacts(items) {
      return items.map((item) => `<article class="contact-box"><h3>${item.title}</h3><p>${item.body}</p><p><a href="${item.href}" target="_blank" rel="noreferrer">${item.linkLabel}</a></p></article>`).join("");
    }
    function updateSubtitle(subtitles) {
      ids("rotating-text").textContent = subtitles[subtitleIndex % subtitles.length];
    }
    function render(lang) {
      const data = copy[lang];
      const { hero, about, experience, projects, skills, metrics, contact } = data;
      const pointSep = lang === "zh" ? "：" : ": ";
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      titleMeta.textContent = data.metaTitle;
      descMeta.setAttribute("content", data.metaDescription);
      ogTitle.setAttribute("content", data.metaTitle);
      ogDesc.setAttribute("content", data.metaDescription);
      ids("brand-role").textContent = data.brandRole;
      ids("nav-about").textContent = data.nav.about;
      ids("nav-experience").textContent = data.nav.experience;
      ids("nav-projects").textContent = data.nav.projects;
      ids("nav-skills").textContent = data.nav.skills;
      ids("nav-metrics").textContent = data.nav.metrics;
      ids("nav-contact").textContent = data.nav.contact;
      ids("lang-toggle").textContent = data.toggle;
      ids("hero-eyebrow").textContent = hero.eyebrow;
      ids("hero-lead").textContent = hero.lead;
      ids("cta-projects").textContent = hero.ctas.projects;
      ids("cta-contact").textContent = hero.ctas.contact;
      ids("cta-resume").textContent = hero.ctas.resume;
      ids("hero-stats").innerHTML = renderStats(hero.stats, "status");
      ids("about-kicker").textContent = about.kicker;
      ids("about-title").textContent = about.title;
      ids("about-desc").textContent = about.desc;
      ids("timeline-list").innerHTML = renderTimeline(about.timeline);
      ids("experience-kicker").textContent = experience.kicker;
      ids("experience-title").textContent = experience.title;
      ids("experience-desc").textContent = experience.desc;
      ids("experience-list").innerHTML = renderExperience(experience.items, pointSep);
      ids("projects-kicker").textContent = projects.kicker;
      ids("projects-title").textContent = projects.title;
      ids("projects-desc").textContent = projects.desc;
      ids("projects-grid").innerHTML = renderProjects(projects.items);
      ids("skills-kicker").textContent = skills.kicker;
      ids("skills-title").textContent = skills.title;
      ids("skills-desc").textContent = skills.desc;
      ids("skills-grid").innerHTML = renderSkills(skills.items);
      ids("metrics-kicker").textContent = metrics.kicker;
      ids("metrics-title").textContent = metrics.title;
      ids("metrics-desc").textContent = metrics.desc;
      ids("metric-strip").innerHTML = renderMetrics(metrics.cards);
      ids("heatmap-title").textContent = metrics.heatmapTitle;
      ids("heatmap-desc").textContent = metrics.heatmapDesc;
      ids("placeholder-title").textContent = metrics.placeholderTitle;
      ids("placeholder-desc").textContent = metrics.placeholderDesc;
      ids("placeholder-list").innerHTML = renderPlaceholders(metrics.placeholders);
      ids("contact-kicker").textContent = contact.kicker;
      ids("contact-title").textContent = contact.title;
      ids("contact-desc").textContent = contact.desc;
      ids("contact-grid").innerHTML = renderContacts(contact.cards);
      ids("footer-left").textContent = data.footer.left;
      ids("footer-right").textContent = data.footer.right;
      subtitleIndex = 0;
      updateSubtitle(hero.subtitles);
      animateBars();
    }

    ids("lang-toggle").addEventListener("click", () => {
      currentLang = currentLang === "zh" ? "en" : "zh";
      render(currentLang);
    });

    window.setInterval(() => {
      const subtitles = copy[currentLang].hero.subtitles;
      subtitleIndex = (subtitleIndex + 1) % subtitles.length;
      updateSubtitle(subtitles);
    }, 2600);

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("show");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.16 });
    document.querySelectorAll(".reveal").forEach((node) => observer.observe(node));
    render(currentLang);
  </script>
</body>
</html>
